    - workspace/
    - implementations/openclaw/
  write:
    - workspace/agents/*/
    - workspace/shared/
  deny:
    - finance/
    - hr/
    - external/

cross_agent_acl:
  can_receive_from:
    - BOOKY
    - MICHAEL
    - PEPPER
    - STOCKY
  can_send_to:
    - BOOKY
    - MICHAEL
    - PEPPER
    - STOCKY
  deny_all_others: true

ipcp_allowlist:
  inbound:
    - Notify-Status
    - Error-Report
  outbound:
    - Request-ATC
    - Notify-Status

enforcement_actions:
  tool_deny: log_and_block
  data_deny: log_and_block
