---
position_id: FCLAW
agent_type: MA
enforcement_version: 1
effective_date: 2026-03-31

tool_allowlist:
  - feishu_chat_read
  - feishu_im_notify
  - feishu_doc_read
  - file_read
  - file_write
  - cron_management
  - taskrun_read
  - playbook_read
  - playbook_write
  - registration_read
  - registration_write
  - atc_dispatch

tool_denylist:
  - finance_api
  - hr_api
  - code_exec
  - external_api_call
  - database_write

data_path_sandbox:
